<!DOCTYPE html>
<html>
<head>
<title>Guitar Guy</title>
<style>
body{
  font-family: Arial;
  background:#0f172a;
  color:white;
  text-align:center;
  padding:60px;
}
.container{
  max-width:600px;
  margin:auto;
}
input{
  padding:12px;
  width:70%;
  margin-top:20px;
  border-radius:6px;
  border:none;
}
button{
  padding:12px 20px;
  background:#22c55e;
  border:none;
  border-radius:6px;
  color:white;
  cursor:pointer;
  margin-top:10px;
}
</style>
</head>
<body>
<div class="container">
  <h1>🎸 Guitar Guy</h1>
  <h2>Learn Guitar Theory The Right Way</h2>
  <p>
    I'm building a tool that helps guitar players master
    the fretboard, triads, and music theory faster.
  </p>
  <p>
    Enter your email to get notified when Guitar Guy launches.
  </p>

  <input type="email" id="emailInput" placeholder="Your email" required>
  <br>
  <button onclick="submitEmail()">Notify Me</button>
  <p id="message" style="margin-top:20px;"></p>
</div>

<script>
async function submitEmail() {
  const email = document.getElementById('emailInput').value;
  const msg = document.getElementById('message');

  if (!email) {
    msg.textContent = 'Please enter your email.';
    return;
  }

  try {
    const response = await fetch('https://formspree.io/f/mzdjyvgp', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email })
    });

    if (response.ok) {
      msg.style.color = '#22c55e';
      msg.textContent = "You're on the list! We'll notify you when Guitar Guy launches.";
      document.getElementById('emailInput').value = '';
    } else {
      msg.style.color = '#f87171';
      msg.textContent = 'Something went wrong. Please try again.';
    }
  } catch (err) {
    msg.style.color = '#f87171';
    msg.textContent = 'Network error. Please try again.';
  }
}
</script>
</body>
</html>
